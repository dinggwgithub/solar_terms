basePath: /
definitions:
  api.CalculationResponse:
    properties:
      calculation:
        type: string
      result: {}
      session_id:
        type: string
      success:
        type: boolean
      timestamp:
        type: string
      warnings:
        items:
          type: string
        type: array
    type: object
  api.CalculatorInfoResponse:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  api.CompareResponse:
    properties:
      calculation:
        type: string
      differences:
        additionalProperties: true
        type: object
      fixed: {}
      improvements:
        items:
          type: string
        type: array
      original: {}
      session_id:
        type: string
      success:
        type: boolean
      summary:
        type: string
      timestamp:
        type: string
    type: object
  api.ErrorResponse:
    properties:
      code:
        type: integer
      error:
        type: string
      success:
        type: boolean
    type: object
  api.HealthResponse:
    properties:
      build_time:
        example: "2024-01-01T12:00:00Z"
        type: string
      status:
        example: healthy
        type: string
      time:
        example: "2024-01-01T12:00:00Z"
        type: string
      version:
        example: 1.0.0
        type: string
    type: object
  api.SystemInfoResponse:
    properties:
      supported_calculations:
        items:
          type: string
        type: array
      total_calculators:
        type: integer
      version:
        type: string
    type: object
  models.CalculationRequest:
    properties:
      calculation:
        description: 计算类型
        example: equation_solver
        type: string
      day:
        description: 日期
        type: integer
      days_from_term:
        description: 距节气天数
        type: integer
      hour:
        description: 小时
        type: integer
      minute:
        description: 分钟
        type: integer
      month:
        description: 月份
        type: integer
      params:
        description: 计算参数（格式1）
      second:
        description: 秒
        type: integer
      solar_date:
        description: 阳历日期
        type: string
      target_longitude:
        description: 目标黄经
        type: number
      term_index:
        description: 节气索引 (0-23)
        type: integer
      year:
        description: 直接参数（格式2）
        type: integer
    required:
    - calculation
    type: object
host: localhost:8080
info:
  contact: {}
  description: 功能丰富的Go语言科学计算库，提供天文计算、历法转换、方程求解等多种科学计算功能。
  title: 科学计算工具集 API
  version: "1.0"
paths:
  /api/calculate:
    post:
      consumes:
      - application/json
      description: 执行各种类型的科学计算（原始版本）
      parameters:
      - description: 会话ID，用于保持计算参数一致性，不传则自动生成
        in: query
        name: session_id
        type: string
      - description: 计算请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CalculationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CalculationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 执行科学计算
      tags:
      - 科学计算
  /api/calculate-fixed:
    post:
      consumes:
      - application/json
      description: 执行各种类型的科学计算（修复版），修正了ODE求解器的数值计算错误，返回严格符合数学要求的计算结果
      parameters:
      - description: 会话ID，用于保持计算参数一致性，不传则自动生成
        in: query
        name: session_id
        type: string
      - description: 计算请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CalculationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CalculationResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 执行科学计算（修复版）
      tags:
      - 科学计算
  /api/calculator-info:
    get:
      consumes:
      - application/json
      description: 获取指定计算器的详细信息
      parameters:
      - description: '计算类型: solar_term, ganzhi, astronomy, starting_age, lunar, planet,
          star, sunrise_sunset, moon_phase, equation_solver'
        in: query
        name: calculation
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CalculatorInfoResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 获取计算器信息
      tags:
      - 计算器管理
  /api/health:
    get:
      consumes:
      - application/json
      description: 健康检查接口
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.HealthResponse'
      summary: 健康检查
      tags:
      - 系统
  /api/solver/compare:
    post:
      consumes:
      - application/json
      description: 同时执行原始版和修复版计算，返回字段级的差异对比，用于验证修复效果
      parameters:
      - description: 计算请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CalculationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.CompareResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: 对比原始版与修复版求解器
      tags:
      - 科学计算
  /api/supported-calculations:
    get:
      consumes:
      - application/json
      description: 获取系统支持的所有计算类型列表
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: 获取支持的计算类型
      tags:
      - 计算器管理
  /api/system-info:
    get:
      consumes:
      - application/json
      description: 获取系统支持的完整信息
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.SystemInfoResponse'
      summary: 获取系统信息
      tags:
      - 系统
swagger: "2.0"
